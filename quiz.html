<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الكويز</title>
<script src="questions.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#0a0a10;color:#f0f0f8;min-height:100vh;direction:rtl}
.screen{display:none;padding:1.5rem;min-height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.home-title{font-size:2.4rem;font-weight:900;text-align:center;margin-bottom:.5rem}
.home-sub{color:#6a6a8a;text-align:center;font-size:1rem;margin-bottom:2.5rem}
.categories{display:grid;grid-template-columns:1fr;gap:1rem;width:100%;max-width:440px}
.cat-card{border-radius:16px;padding:1.4rem 1.5rem;cursor:pointer;display:flex;align-items:center;gap:1.2rem;border:none;text-align:right;font-family:'Tajawal',sans-serif;transition:transform .18s,filter .18s}
.cat-card:hover{transform:translateY(-3px);filter:brightness(1.15)}
.cat-card.football{background:linear-gradient(135deg,#166534,#22c55e)}
.cat-card.geo{background:linear-gradient(135deg,#1d4ed8,#60a5fa)}
.cat-card.python{background:linear-gradient(135deg,#7e22ce,#c084fc)}
.cat-icon{width:54px;height:54px;border-radius:14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.cat-name{font-size:1.15rem;font-weight:800;color:#fff;margin-bottom:.25rem}
.cat-desc{font-size:.8rem;color:rgba(255,255,255,.7)}
.cat-badge{margin-right:auto;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:99px;background:rgba(255,255,255,.25);color:#fff;white-space:nowrap}
.level-title{font-size:1.7rem;font-weight:900;text-align:center;margin-bottom:.4rem}
.level-sub{color:#6a6a8a;text-align:center;font-size:.95rem;margin-bottom:2rem}
.level-grid{display:grid;grid-template-columns:1fr;gap:.9rem;width:100%;max-width:400px}
.level-btn{border:none;border-radius:14px;padding:1.1rem 1.5rem;cursor:pointer;display:flex;align-items:center;gap:1rem;font-family:'Tajawal',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;transition:transform .15s,filter .15s}
.level-btn:hover{transform:translateY(-3px);filter:brightness(1.15)}
.level-btn.easy{background:linear-gradient(135deg,#14532d,#22c55e)}
.level-btn.normal{background:linear-gradient(135deg,#92400e,#f59e0b)}
.level-btn.hard{background:linear-gradient(135deg,#7f1d1d,#ef4444)}
.level-icon{font-size:1.5rem}
.back-btn{border:none;border-radius:10px;padding:.7rem 1.6rem;background:linear-gradient(135deg,#1e1e35,#2d2d50);color:#bbb;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:600;margin-top:1.25rem;transition:filter .15s,color .15s}
.back-btn:hover{filter:brightness(1.3);color:#fff}
.quiz-wrap{width:100%;max-width:500px}
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.q-counter{font-size:.88rem;color:#6a6a8a}
.q-score{font-size:.88rem;font-weight:700;background:linear-gradient(135deg,#1e1e35,#2d2d50);border-radius:99px;padding:5px 16px;color:#fff}
.prog-bar{height:6px;background:#1a1a26;border-radius:99px;margin-bottom:1.5rem;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
.prog-fill.football{background:linear-gradient(90deg,#16a34a,#4ade80)}
.prog-fill.geo{background:linear-gradient(90deg,#2563eb,#60a5fa)}
.prog-fill.python{background:linear-gradient(90deg,#9333ea,#c084fc)}
.q-card{background:#13131e;border:1px solid #252540;border-radius:18px;padding:1.6rem;margin-bottom:1rem}
.q-tag{font-size:.73rem;color:#6a6a8a;margin-bottom:.8rem}
.q-text{font-size:1.1rem;font-weight:700;line-height:1.7;color:#fff;white-space:pre-line}
.opts{display:flex;flex-direction:column;gap:.65rem;margin-bottom:.8rem}
.opt{border:1.5px solid #3a3a5a;border-radius:12px;padding:.9rem 1.1rem;cursor:pointer;display:flex;align-items:center;gap:.9rem;color:#fff;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:600;background:#1e1e35;transition:filter .15s,transform .12s,background .12s}
.opt:hover:not(:disabled){background:#2a2a50;filter:brightness(1.2);transform:translateX(-4px)}
.opt:disabled{cursor:default;opacity:.65}
.opt.correct{background:linear-gradient(135deg,#14532d,#22c55e)!important;border-color:#22c55e!important;opacity:1!important}
.opt.wrong{background:linear-gradient(135deg,#7f1d1d,#ef4444)!important;border-color:#ef4444!important;opacity:1!important}
.opt-letter{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;flex-shrink:0;color:#fff}
.feedback{border-radius:12px;padding:.75rem 1rem;font-size:.9rem;font-weight:700;display:none;align-items:center;gap:.6rem;margin-bottom:.8rem}
.feedback.correct{display:flex;background:#14532d66;color:#4ade80;border:1px solid #22c55e55}
.feedback.wrong{display:flex;background:#7f1d1d66;color:#fca5a5;border:1px solid #ef444455}
.next-btn{width:100%;padding:.95rem;border:none;border-radius:13px;font-family:'Tajawal',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;display:none;color:#fff;transition:filter .15s,transform .12s}
.next-btn.visible{display:block}
.next-btn:hover{filter:brightness(1.15);transform:translateY(-2px)}
.next-btn.football{background:linear-gradient(135deg,#14532d,#22c55e)}
.next-btn.geo{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.next-btn.python{background:linear-gradient(135deg,#7e22ce,#a855f7)}
.result-wrap{width:100%;max-width:420px;text-align:center}
.result-emoji{font-size:4rem;margin-bottom:1rem}
.result-pct{font-size:4.5rem;font-weight:900;margin-bottom:.3rem}
.result-pct.football{color:#22c55e}.result-pct.geo{color:#3b82f6}.result-pct.python{color:#a855f7}
.result-msg{color:#6a6a8a;font-size:1rem;margin-bottom:2rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;background:#13131e;border:1px solid #252540;border-radius:16px;padding:1.4rem;margin-bottom:1.5rem}
.stat{text-align:center}
.stat-n{font-size:1.8rem;font-weight:900}
.stat-n.g{color:#22c55e}.stat-n.r{color:#ef4444}.stat-n.y{color:#f59e0b}
.stat-l{font-size:.8rem;color:#6a6a8a;margin-top:3px}
.play-again{width:100%;padding:.95rem;border:none;border-radius:13px;font-family:'Tajawal',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;margin-bottom:.8rem;color:#fff;transition:filter .15s}
.play-again:hover{filter:brightness(1.15)}
.play-again.football{background:linear-gradient(135deg,#14532d,#22c55e)}
.play-again.geo{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.play-again.python{background:linear-gradient(135deg,#7e22ce,#a855f7)}
.home-again{width:100%;padding:.85rem;border:none;border-radius:13px;background:linear-gradient(135deg,#1e1e35,#2d2d50);color:#ccc;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:filter .15s,color .15s}
.home-again:hover{filter:brightness(1.4);color:#fff}
</style>
</head>
<body>

<div id="home" class="screen active">
  <p class="home-title">🎯 لعبة الكويز</p>
  <p class="home-sub">اختر الفئة اللي تبدأ فيها</p>
  <div class="categories">
    <div class="cat-card football" onclick="goLevel('football')">
      <div class="cat-icon">⚽</div>
      <div style="flex:1"><p class="cat-name">كرة القدم</p><p class="cat-desc">أسئلة عن الكرة العالمية والمحلية</p></div>
      <span class="cat-badge">5 أسئلة</span>
    </div>
    <div class="cat-card geo" onclick="goLevel('geo')">
      <div class="cat-icon">🌍</div>
      <div style="flex:1"><p class="cat-name">الجغرافيا</p><p class="cat-desc">دول، عواصم، جبال وأنهار</p></div>
      <span class="cat-badge">5 أسئلة</span>
    </div>
    <div class="cat-card python" onclick="goLevel('python')">
      <div class="cat-icon">🐍</div>
      <div style="flex:1"><p class="cat-name">برمجة Python</p><p class="cat-desc">أسئلة من مادة الذكاء الاصطناعي</p></div>
      <span class="cat-badge">5 أسئلة</span>
    </div>
  </div>
</div>

<div id="level-screen" class="screen">
  <p class="level-title" id="level-title">اختر المستوى</p>
  <p class="level-sub" id="level-sub">كم قديش مستواك؟</p>
  <div class="level-grid">
    <button class="level-btn easy" onclick="startQuiz('easy')"><span class="level-icon">🌱</span> مبتدئ</button>
    <button class="level-btn normal" onclick="startQuiz('normal')"><span class="level-icon">🔥</span> متوسط</button>
    <button class="level-btn hard" onclick="startQuiz('hard')"><span class="level-icon">⚡</span> محترف</button>
  </div>
  <button class="back-btn" onclick="show('home')">← رجوع</button>
</div>

<div id="quiz-screen" class="screen">
  <div class="quiz-wrap">
    <div class="quiz-top">
      <p class="q-counter" id="q-counter">سؤال 1 من 5</p>
      <span class="q-score" id="q-score">0 نقطة</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:20%"></div></div>
    <div class="q-card">
      <p class="q-tag" id="q-tag"></p>
      <p class="q-text" id="q-text"></p>
    </div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"><span id="fb-text"></span></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()"></button>
  </div>
</div>

<div id="result-screen" class="screen">
  <div class="result-wrap">
    <div class="result-emoji" id="res-emoji"></div>
    <p class="result-pct" id="res-pct"></p>
    <p class="result-msg" id="res-msg"></p>
    <div class="stats">
      <div class="stat"><p class="stat-n g" id="s-cor"></p><p class="stat-l">صح</p></div>
      <div class="stat"><p class="stat-n r" id="s-wrg"></p><p class="stat-l">غلط</p></div>
      <div class="stat"><p class="stat-n y" id="s-pts"></p><p class="stat-l">نقاط</p></div>
    </div>
    <button class="play-again" id="play-again" onclick="playAgain()">العب مرة ثانية ↺</button>
    <button class="home-again" onclick="show('home')">← العودة للرئيسية</button>
  </div>
</div>

<script>
let cat='', lvl='', qs=[], cur=0, score=0, corr=0, wrng=0;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goLevel(c){
  cat = c;
  show('level-screen');
}

function startQuiz(l){
  lvl=l; cur=0; score=0; corr=0; wrng=0;
  const catMap = {'football':'football','geo':'geography','python':'python'};
  qs = [...Q[catMap[cat]][l]];
  for(let i=qs.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [qs[i],qs[j]]=[qs[j],qs[i]];
  }
  show('quiz-screen');
  loadQ();
}

function loadQ(){
  const q=qs[cur], total=qs.length;
  document.getElementById('q-counter').textContent='سؤال '+(cur+1)+' من '+total;
  document.getElementById('q-score').textContent=score+' نقطة';
  const pf=document.getElementById('prog-fill');
  pf.style.width=(((cur+1)/total)*100)+'%';
  pf.className='prog-fill '+(cat==='geo'?'geo':cat);
  document.getElementById('q-tag').textContent=(cat==='football'?'كرة القدم':cat==='geo'?'الجغرافيا':'Python')+' — '+(lvl==='easy'?'مبتدئ':lvl==='normal'?'متوسط':'محترف')+' — سؤال '+(cur+1);
  document.getElementById('q-text').textContent=q.question;
  const letters=['أ','ب','ج','د'];
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  q.options.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="opt-letter">'+letters[i]+'</span>'+o;
    b.onclick=()=>answer(i,b);
    opts.appendChild(b);
  });
  document.getElementById('feedback').className='feedback';
  const nb=document.getElementById('next-btn');
  nb.className='next-btn';
  nb.textContent=cur===qs.length-1?'عرض النتيجة ←':'السؤال التالي ←';
}

function answer(i,btn){
  const q=qs[cur];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(i===q.answer){
    btn.classList.add('correct');
    fb.className='feedback correct';
    document.getElementById('fb-text').textContent='✓ إجابة صحيحة! +'+PTS+' نقطة';
    score+=PTS; corr++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt')[q.answer].classList.add('correct');
    fb.className='feedback wrong';
    document.getElementById('fb-text').textContent='✗ خطأ! الإجابة الصحيحة: '+q.options[q.answer];
    wrng++;
  }
  document.getElementById('next-btn').className='next-btn '+(cat==='geo'?'geo':cat)+' visible';
}

function nextQ(){ cur++; if(cur>=qs.length) showResult(); else loadQ(); }

function showResult(){
  const total=qs.length;
  const pct=Math.round((corr/total)*100);
  let em='😐', msg='حاول مجدداً!';
  if(pct>=80){em='🏆';msg='ممتاز! أنت محترف!';}
  else if(pct>=70){em='👍';msg='متوسط! يمكنك التحسين!';}
  else if(pct>=60){em='😐';msg='مقبول! استمر في التدريب!';}
  document.getElementById('res-emoji').textContent=em;
  const rp=document.getElementById('res-pct');
  rp.textContent=pct+'%';
  rp.className='result-pct '+(cat==='geo'?'geo':cat);
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('s-cor').textContent=corr;
  document.getElementById('s-wrg').textContent=wrng;
  document.getElementById('s-pts').textContent=score;
  document.getElementById('play-again').className='play-again '+(cat==='geo'?'geo':cat);
  show('result-screen');
}

function playAgain(){ show('home'); }
</script>
</body>
</html>
